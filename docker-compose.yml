services:
  wedding:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wedding-website
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      # Persist guest wishes data
      - wedding-data:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  wedding-data:
    driver: local
