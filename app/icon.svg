<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a0bf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4778e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c25b78;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c25b78" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="#fdf2f4" />
  <circle cx="256" cy="256" r="235" fill="none" stroke="#e8a0bf" stroke-width="2" opacity="0.4"/>
  <!-- Main heart -->
  <g filter="url(#shadow)">
    <path d="M256 420
      C 180 350, 80 280, 80 200
      C 80 140, 130 100, 168 100
      C 206 100, 240 130, 256 160
      C 272 130, 306 100, 344 100
      C 382 100, 432 140, 432 200
      C 432 280, 332 350, 256 420 Z"
      fill="url(#heartGrad)" />
  </g>
  <!-- Inner highlight -->
  <path d="M256 390
    C 195 330, 115 270, 115 205
    C 115 160, 148 130, 175 130
    C 202 130, 232 152, 246 175"
    fill="none" stroke="white" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  <!-- Small sparkle dots -->
  <circle cx="180" cy="155" r="4" fill="white" opacity="0.6"/>
  <circle cx="160" cy="180" r="2.5" fill="white" opacity="0.4"/>
  <!-- Initials -->
  <text x="256" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" opacity="0.9">L &amp; T</text>
</svg>
